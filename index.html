<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miss You - Ghost</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            gap: 20px;
        }
        
        #canvas {
            width: 700px;
            height: 440px;
            background-color: #000;
            color: #fff;
            white-space: pre;
            font-size: 14px;
            line-height: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #playButton {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #fff;
            color: #000;
            border: 2px solid #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #playButton:hover {
            background-color: #000;
            color: #fff;
        }

        #playButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 768px) {
            #canvas {
                width: 100%;
                height: 60vh;
                font-size: 12px;
                line-height: 18px;
            }

            #playButton {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <button id="playButton">▶ PLAY</button>
    <audio id="audio"></audio>

    <script>
        // Lirik lagu beserta durasinya
        const LYRICS = [
            { text: "So, what if I call", duration: 4 },
            { text: "And you pick up the phone?", duration: 5 },
            { text: "And I use this holiday to make my way to your ghost", duration: 9 },
            { text: "Oh, what if you're lonely", duration: 5 },
            { text: "And you know I am too", duration: 4 },
            { text: "And i get the chance to stay", duration: 3 },
            { text: "Merry Christmas, I miss you", duration: 5 },
        ];

        const FLAKES = ["⋆", "꙳", "•", "❅", "‧", "❆", "₊"];
        const WIDTH = 70;
        const HEIGHT = 22;
        const FPS = 0.04;

        const canvas = document.getElementById('canvas');
        const playButton = document.getElementById('playButton');
        const audio = document.getElementById('audio');

        // Set audio source
        audio.src = "./lagu.mp3";

        let isPlaying = false;

        function getVisualLength(text) {
            let length = 0;
            for (let char of text) {
                if (isWideCharacter(char)) {
                    length += 2;
                } else {
                    length += 1;
                }
            }
            return length;
        }

        function isWideCharacter(char) {
            const code = char.charCodeAt(0);
            if (code >= 0x1100 && code <= 0x115F) return true;
            if (code >= 0x2300 && code <= 0x23FF) return true;
            if (code >= 0x2E80 && code <= 0xA4CF) return true;
            if (code >= 0xAC00 && code <= 0xD7AF) return true;
            if (code >= 0xF900 && code <= 0xFAFF) return true;
            if (code >= 0x20000 && code <= 0x2A6DF) return true;
            if (char === "꙳" || char === "❅" || char === "❆") return true;
            return false;
        }

        function render(lyric, snow) {
            for (let r = HEIGHT - 1; r > 0; r--) {
                for (let c = 0; c < WIDTH; c++) {
                    if (snow[r - 1][c] !== " ") {
                        if (Math.random() < 0.09) {
                            snow[r][c] = snow[r - 1][c];
                            snow[r - 1][c] = " ";
                        }
                    }
                }
            }

            for (let c = 0; c < WIDTH; c++) {
                if (Math.random() < 0.10) {
                    snow[HEIGHT - 1][c] = " ";
                }
            }

            for (let c = 0; c < WIDTH; c++) {
                if (snow[0][c] === " ") {
                    snow[0][c] = Math.random() < 0.010 ? FLAKES[Math.floor(Math.random() * FLAKES.length)] : " ";
                }
            }

            const frame = snow.map(row => [...row]);
            const mid_row = Math.floor(HEIGHT / 2);

            for (let r_offset = -1; r_offset <= 1; r_offset++) {
                if (mid_row + r_offset >= 0 && mid_row + r_offset < HEIGHT) {
                    frame[mid_row + r_offset] = Array(WIDTH).fill(" ");
                }
            }

            const start_col = Math.floor((WIDTH - lyric.length) / 2);
            let col = start_col;
            for (let ch of lyric) {
                if (col >= 0 && col < WIDTH) {
                    frame[mid_row][col] = ch;
                    col++;
                } else {
                    col++;
                }
            }

            return frame.map(row => row.join("")).join("\n");
        }

        function renderSimpleText(lines) {
            const frame = Array(HEIGHT).fill(null).map(() => Array(WIDTH).fill(" "));
            const startRow = Math.floor((HEIGHT - lines.length) / 2);

            for (let i = 0; i < lines.length; i++) {
                const r = startRow + i;
                if (r >= 0 && r < HEIGHT) {
                    const text = lines[i];
                    const start_col = Math.floor((WIDTH - text.length) / 2);
                    
                    for (let j = 0; j < text.length; j++) {
                        const c = start_col + j;
                        if (c >= 0 && c < WIDTH) {
                            frame[r][c] = text[j];
                        }
                    }
                }
            }

            return frame.map(row => row.join("")).join("\n");
        }

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startAnimation() {
            let snow = Array(HEIGHT).fill(null).map(() => Array(WIDTH).fill(" "));
            isPlaying = true;
            playButton.disabled = true;
            playButton.textContent = "▶ PLAYING...";

            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio play error:", e));

            try {
                const titleLines = [
                    "⋆꙳•❅*‧ ‧*❆ ₊⋆",
                    "I Miss You",
                    "Ghost",
                    "⋆꙳•❅*‧ ‧*❆ ₊⋆"
                ];

                canvas.textContent = renderSimpleText(titleLines);
                await sleep(3000);

                const introDeadline = Date.now() + 4000;
                while (Date.now() < introDeadline) {
                    canvas.textContent = render("", snow);
                    await sleep(FPS * 1000);
                }

                for (let { text, duration } of LYRICS) {
                    const lyricDeadline = Date.now() + duration * 1000;
                    while (Date.now() < lyricDeadline) {
                        canvas.textContent = render(text, snow);
                        await sleep(FPS * 1000);
                    }
                }

                canvas.textContent = renderSimpleText(["i loved u"]);
                await sleep(3500);

                canvas.textContent = "";
            } catch (e) {
                console.error(e);
            } finally {
                isPlaying = false;
                playButton.disabled = false;
                playButton.textContent = "▶ PLAY";
                audio.pause();
            }
        }

        playButton.addEventListener('click', () => {
            if (!isPlaying) {
                startAnimation();
            }
        });
    </script>
</body>
</html>
